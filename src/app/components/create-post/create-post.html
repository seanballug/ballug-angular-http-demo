<div>
  <h2>Create Post</h2>

  <input
    type="text"
    placeholder="Title"
    [(ngModel)]="title"
  />

  <br /><br />

  <textarea
    placeholder="Body"
    [(ngModel)]="body"
  ></textarea>

  <br /><br />

  <button (click)="submitPost()">Submit</button>

  <div *ngIf="response">
    <h3>Response from API:</h3>
    <p><strong>ID:</strong> {{ response.id }}</p>
    <p><strong>Title:</strong> {{ response.title }}</p>
    <p><strong>Body:</strong> {{ response.body }}</p>
  </div>
</div>
